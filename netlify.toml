[[redirects]]
  from = "/basic"
  to = "/basic.html"
  status = 302

[[redirects]]
  from = "/intermediate"
  to = "/intermediate.html"
  status = 302

[[redirects]]
  from = "/advanced"
  to = "/advanced.html"
  status = 302

[[redirects]]
  from = "/verify"
  to = "/verify.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
